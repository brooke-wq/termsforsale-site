[build]
  publish = "termsforsale"
  functions = "termsforsale/netlify/functions"

[[redirects]]
  from = "/api/hud-fmr"
  to = "/.netlify/functions/hud-fmr"
  status = 200

[[redirects]]
  from = "/api/drive-image"
  to = "/.netlify/functions/drive-image"
  status = 200

[[redirects]]
  from = "/api/drive-thumb"
  to = "/.netlify/functions/drive-thumb"
  status = 200

[[redirects]]
  from = "/api/drive-photos"
  to = "/.netlify/functions/drive-photos"
  status = 200

[[redirects]]
  from = "/api/deals"
  to = "/.netlify/functions/deals"
  status = 200

[[redirects]]
  from = "/api/notify-buyers"
  to = "/.netlify/functions/notify-buyers"
  status = 200

# /api/notify-test removed — was publicly accessible test endpoint

[[redirects]]
  from = "/api/create-post"
  to = "/.netlify/functions/create-post"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/webhook-test.html"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
