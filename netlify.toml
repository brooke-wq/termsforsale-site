[build]
  publish = "termsforsale"
  functions = "termsforsale/netlify/functions"

# Legacy deals.termsforsale.com → apex termsforsale.com
# Netlify's built-in "primary domain" auto-301 was not firing reliably in
# incognito after the primary-domain switch, so this forces the redirect at
# the rule level. Path-preserving so /deal.html?id=... still lands correctly.
[[redirects]]
  from = "https://deals.termsforsale.com/*"
  to = "https://termsforsale.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://deals.termsforsale.com/*"
  to = "https://termsforsale.com/:splat"
  status = 301
  force = true

# buyingcriteria.com → redirect to buying criteria page
[[redirects]]
  from = "https://buyingcriteria.com/*"
  to = "https://termsforsale.com/buying-criteria.html"
  status = 301
  force = true

[[redirects]]
  from = "https://www.buyingcriteria.com/*"
  to = "https://termsforsale.com/buying-criteria.html"
  status = 301
  force = true

# /browse and /deals → deals.html
[[redirects]]
  from = "/browse"
  to = "/deals.html"
  status = 200

[[redirects]]
  from = "/deals"
  to = "/deals.html"
  status = 200

# Short deal links: /d/phoenix-85016-phx001 → deal.html
# The page JS parses the slug out of window.location.pathname and
# resolves it against the dealCode (or UUID prefix) returned from Notion.
# Rewrite (status 200) keeps the pretty URL visible in the address bar.
[[redirects]]
  from = "/d/*"
  to = "/deal.html"
  status = 200

# Legacy /about.html → homepage
[[redirects]]
