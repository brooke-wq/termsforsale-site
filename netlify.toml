[build]
  publish = "termsforsale"
  functions = "termsforsale/netlify/functions"

[[redirects]]
  from = "/api/hud-fmr"
  to = "/.netlify/functions/hud-fmr"
  status = 200

[[redirects]]
  from = "/api/drive-thumb"
  to = "/.netlify/functions/drive-thumb"
  status = 200

[[redirects]]
  from = "/api/drive-photos"
  to = "/.netlify/functions/drive-photos"
  status = 200

[[redirects]]
  from = "/api/create-post"
  to = "/.netlify/functions/create-post"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
