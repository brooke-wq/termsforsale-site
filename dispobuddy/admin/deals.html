<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JV Deals — Dispo Buddy Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
<style>
  .filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .filter-bar input,.filter-bar select{padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13px;background:#fff;outline:none}
  .filter-bar input{flex:1;min-width:220px}
  .filter-bar input:focus,.filter-bar select:focus{border-color:var(--blue)}
  .drawer-backdrop{position:fixed;inset:0;background:rgba(13,31,60,.55);display:none;z-index:80}
  .drawer-backdrop.open{display:block}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(720px,94vw);background:#fff;z-index:90;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .drawer-head{padding:22px 26px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
  .drawer-head h3{font-size:17px;font-weight:900;color:var(--navy);margin-bottom:4px}
  .drawer-head .sub{font-size:12px;color:var(--text-light)}
  .drawer-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-light);line-height:1}
  .drawer-body{flex:1;overflow-y:auto;padding:22px 26px}
  .dd-section{margin-bottom:22px}
  .dd-section h4{font-size:11px;font-weight:800;color:var(--text-light);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
  .dd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
  .dd-field{background:var(--bg);border-radius:6px;padding:10px 14px}
  .dd-field-label{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:4px}
  .dd-field-val{font-size:13px;color:var(--navy);font-weight:600;word-break:break-word}
  .dd-link{display:inline-block;padding:8px 14px;background:var(--blue);color:#fff;border-radius:6px;font-size:12px;font-weight:700;margin-right:8px;margin-bottom:8px}
  .dd-link:hover{text-decoration:none;color:#fff;background:var(--blue-dark)}
  .row-click{cursor:pointer}
  .row-click.is-open td{background:rgba(247,148,29,.08)}
</style>
</head>
<body>

<div class="admin-shell">

  <main class="main">
    <div class="topbar">
      <div class="topbar-title">
        <div class="topbar-crumb">Operations</div>
        <div class="topbar-h">JV Deals</div>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn primary" onclick="reload()">
          <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
          <span>Refresh</span>
        </button>
      </div>
    </div>

    <div class="content">

      <div class="stat-grid">
        <div class="stat"><div class="stat-label">Total JV Deals</div><div class="stat-value" id="s-total">—</div><div class="stat-sub">All-time submissions</div></div>
        <div class="stat orange"><div class="stat-label">Showing</div><div class="stat-value" id="s-shown">—</div><div class="stat-sub">After filters applied</div></div>
        <div class="stat green"><div class="stat-label">Active</div><div class="stat-value" id="s-active">—</div><div class="stat-sub">In-progress deals</div></div>
        <div class="stat purple"><div class="stat-label">Funded</div><div class="stat-value" id="s-funded">—</div><div class="stat-sub">Closed & paid</div></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title"><svg viewBox="0 0 24 24"><path d="M3 9l9-6 9 6v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>All JV Deals</div>
            <div class="panel-sub">Click a row to open deal details</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="filter-bar">
            <input type="search" id="q" placeholder="Search address / city / Deal ID / partner...">
            <select id="statusFilter">
              <option value="">All statuses</option>
              <option value="New Submission">New Submission</option>
              <option value="Under Review">Under Review</option>
              <option value="Actively Marketing">Actively Marketing</option>
              <option value="Under Contract">Under Contract</option>
              <option value="Assignment Sent">Assignment Sent</option>
              <option value="Assigned with EMD">Assigned with EMD</option>
              <option value="Closed">Closed</option>
              <option value="Funded">Funded</option>
              <option value="Dead">Dead</option>
              <option value="Lost">Lost</option>
            </select>
          </div>
          <div id="table-wrap" class="table-wrap"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </main>

</div>

<!-- Deal detail drawer -->
<div class="drawer-backdrop" id="drawer-bg"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <div>
      <h3 id="dd-title">Deal</h3>
      <div class="sub" id="dd-sub">—</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="dd-body">
    <div class="spinner"></div>
  </div>
</aside>

<script src="/admin/admin.js"></script>
<script>
AdminShell.renderShell('deals');

var ALL_DEALS = [];

async function load() {
  document.getElementById('table-wrap').innerHTML = '<div class="spinner"></div>';
  try {
    var res = await AdminShell.fetch('/api/admin-deals');
    if (!res.ok) {
      document.getElementById('table-wrap').innerHTML = '<div class="err">Failed to load: ' + res.status + '</div>';
      return;
    }
    var data = await res.json();
    ALL_DEALS = data.deals || [];
    document.getElementById('s-total').textContent = AdminShell.fmtNum(ALL_DEALS.length);
    document.getElementById('s-active').textContent = AdminShell.fmtNum(
      ALL_DEALS.filter(function (d) { return ['New Submission','Under Review','Actively Marketing'].indexOf(d.status) >= 0; }).length
    );
    document.getElementById('s-funded').textContent = AdminShell.fmtNum(
      ALL_DEALS.filter(function (d) { return ['Closed','Funded'].indexOf(d.status) >= 0; }).length
    );
    render();
  } catch (err) {
    document.getElementById('table-wrap').innerHTML = '<div class="err">' + err.message + '</div>';
  }
}

function render() {
  var q = (document.getElementById('q').value || '').toLowerCase();
  var status = document.getElementById('statusFilter').value;
  var rows = ALL_DEALS.filter(function (d) {
    if (status && d.status !== status) return false;
    if (q) {
      var hay = [d.street,d.city,d.state,d.dealCode,d.jvPartner,d.dealType].filter(Boolean).join(' ').toLowerCase();
      if (hay.indexOf(q) < 0) return false;
    }
    return true;
  });
  document.getElementById('s-shown').textContent = AdminShell.fmtNum(rows.length);

  if (!rows.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="state"><h3>No deals match</h3><p>Try clearing filters.</p></div>';
    return;
  }
  var html = '<table class="t"><thead><tr>'
    + '<th>Deal ID</th><th>Property</th><th>Partner</th><th>Type</th><th>Status</th><th class="tr">Asking</th><th class="tr">COE</th>'
    + '</tr></thead><tbody>'
    + rows.map(function (d) {
        var loc = [d.city, d.state].filter(Boolean).join(', ');
        var partner = (d.jvPartner || '').split('|')[0].trim();
        return '<tr class="row-click" data-id="' + AdminShell.esc(d.id) + '">'
          + '<td class="cell-strong">' + AdminShell.esc(d.dealCode || '—') + '</td>'
          + '<td><div class="cell-strong">' + AdminShell.esc(d.street || '(no address)') + '</div><div class="cell-muted">' + AdminShell.esc(loc) + '</div></td>'
          + '<td>' + AdminShell.esc(partner || '—') + '</td>'
          + '<td><span class="pill blue">' + AdminShell.esc(d.dealType || '—') + '</span></td>'
          + '<td><span class="pill ' + statusPill(d.status) + '">' + AdminShell.esc(d.status || '—') + '</span></td>'
          + '<td class="cell-strong tr">' + (d.askingPrice ? AdminShell.fmtMoney(d.askingPrice) : '—') + '</td>'
          + '<td class="tr">' + (d.coe ? AdminShell.fmtDate(d.coe) : '—') + '</td>'
          + '</tr>';
      }).join('')
    + '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
  document.querySelectorAll('.row-click').forEach(function (tr) {
    tr.addEventListener('click', function () {
      var id = tr.getAttribute('data-id');
      openDrawer(ALL_DEALS.find(function (d) { return d.id === id; }));
    });
  });
}

function statusPill(status) {
  if (!status) return 'gray';
  if (status === 'Closed' || status === 'Funded') return 'green';
  if (status === 'Under Contract' || status === 'Assignment Sent' || status === 'Assigned with EMD') return 'orange';
  if (status === 'Actively Marketing') return 'blue';
  if (status === 'Dead' || status === 'Lost') return 'red';
  return 'purple';
}

function openDrawer(deal) {
  if (!deal) return;
  document.getElementById('dd-title').textContent = deal.dealCode || '(no Deal ID)';
  var loc = [deal.city, deal.state, deal.zip].filter(Boolean).join(', ');
  document.getElementById('dd-sub').textContent = (deal.street || '') + ' · ' + loc;

  var partner = (deal.jvPartner || '').split('|');
  var partnerName = (partner[0] || '').trim();
  var partnerPhone = (partner[1] || '').trim();
  var partnerEmail = (partner[2] || '').trim();

  function field(label, val) {
    if (val === null || val === undefined || val === '') return '';
    return '<div class="dd-field"><div class="dd-field-label">' + label + '</div><div class="dd-field-val">' + AdminShell.esc(val) + '</div></div>';
  }
  function money(v) { return v ? AdminShell.fmtMoney(v) : ''; }

  var html =
    '<div class="dd-section"><h4>Status</h4>'
    + '<div class="dd-grid">'
    + field('Status', deal.status)
    + field('Deal Type', deal.dealType)
    + field('COE', deal.coe ? AdminShell.fmtDate(deal.coe) : '')
    + field('Last Edited', deal.lastEdited ? AdminShell.fmtDate(deal.lastEdited) : '')
    + '</div></div>'
    + '<div class="dd-section"><h4>Partner</h4>'
    + '<div class="dd-grid">'
    + field('Name', partnerName)
    + (partnerPhone ? '<div class="dd-field"><div class="dd-field-label">Phone</div><div class="dd-field-val"><a href="tel:' + AdminShell.esc(partnerPhone) + '">' + AdminShell.esc(partnerPhone) + '</a></div></div>' : '')
    + (partnerEmail ? '<div class="dd-field"><div class="dd-field-label">Email</div><div class="dd-field-val"><a href="mailto:' + AdminShell.esc(partnerEmail) + '">' + AdminShell.esc(partnerEmail) + '</a></div></div>' : '')
    + '</div></div>'
    + '<div class="dd-section"><h4>Pricing</h4>'
    + '<div class="dd-grid">'
    + field('Asking', money(deal.askingPrice))
    + field('Contracted', money(deal.contractedPrice))
    + field('Entry Fee', money(deal.entryFee))
    + field('ARV', deal.arv)
    + '</div></div>'
    + '<div class="dd-section"><h4>Property</h4>'
    + '<div class="dd-grid">'
    + field('Type', deal.propertyType)
    + field('Beds', deal.beds)
    + field('Baths', deal.baths)
    + field('Sqft', deal.sqft)
    + field('Year Built', deal.yearBuilt)
    + field('Lot Size', deal.lotSize)
    + field('County', deal.county)
    + field('HOA', deal.hoa)
    + '</div></div>'
    + '<div class="dd-section"><h4>Links</h4>'
    + (deal.photos ? '<a href="' + AdminShell.esc(deal.photos) + '" target="_blank" rel="noopener" class="dd-link">📷 Photos</a>' : '')
    + (deal.documents ? '<a href="' + AdminShell.esc(deal.documents) + '" target="_blank" rel="noopener" class="dd-link">📄 Documents</a>' : '')
    + '<a href="https://www.notion.so/' + AdminShell.esc((deal.id || '').replace(/-/g,'')) + '" target="_blank" rel="noopener" class="dd-link" style="background:var(--navy)">Open in Notion</a>'
    + '</div>';

  document.getElementById('dd-body').innerHTML = html;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-bg').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('drawer-bg').addEventListener('click', closeDrawer);
document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeDrawer(); });

document.getElementById('q').addEventListener('input', render);
document.getElementById('statusFilter').addEventListener('change', render);

function reload() { AdminShell.toast('Refreshing...'); load(); }
window.reload = reload;

AdminShell.requireAuth(load);
</script>

</body>
</html>
