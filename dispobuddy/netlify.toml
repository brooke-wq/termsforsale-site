# Dispo Buddy — Netlify Configuration
# Domain: dispobuddy.com
# Deployed as a separate Netlify site from the same repo
# or from a split-out repo

[build]
  publish = "."
  functions = "netlify/functions"

# ── API Function Redirects ──
[[redirects]]
  from = "/api/dispo-buddy-submit"
  to = "/.netlify/functions/dispo-buddy-submit"
  status = 200

[[redirects]]
  from = "/api/partner-onboard"
  to = "/.netlify/functions/partner-onboard"
  status = 200

[[redirects]]
  from = "/api/partner-login"
  to = "/.netlify/functions/partner-login"
  status = 200

[[redirects]]
  from = "/api/partner-deals"
  to = "/.netlify/functions/partner-deals"
  status = 200

[[redirects]]
  from = "/api/partner-deal-detail"
  to = "/.netlify/functions/partner-deal-detail"
  status = 200

[[redirects]]
  from = "/api/buyer-demand"
  to = "/.netlify/functions/buyer-demand"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# ── Clean URLs (no .html extensions) ──
[[redirects]]
  from = "/process"
  to = "/process.html"
  status = 200

[[redirects]]
  from = "/what-we-look-for"
  to = "/what-we-look-for.html"
  status = 200

[[redirects]]
  from = "/submit-deal"
  to = "/submit-deal.html"
  status = 200

[[redirects]]
  from = "/join"
  to = "/join.html"
  status = 200

[[redirects]]
  from = "/proof"
  to = "/proof.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/deal-detail"
  to = "/deal-detail.html"
  status = 200

[[redirects]]
  from = "/earnings"
  to = "/earnings.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/buyers-map"
  to = "/buyers-map.html"
  status = 200

# ── 404 fallback ──
[[redirects]]
  from = "/admin/sop"
  to = "/admin/sop.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ── Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── Cache static assets ──
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
