<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Terms For Sale</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1F3C;--blue:#29ABE2;--blue-dark:#1a8bbf;--orange:#F7941D;--white:#fff;--bg:#F7FAFC;--text:#1A2E44;--text-mid:#4A5568;--text-light:#718096;--border:#E2E8F0;--font:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.logo{margin-bottom:32px}
h1{font-size:72px;font-weight:800;color:var(--navy);line-height:1;margin-bottom:8px}
h2{font-size:22px;font-weight:700;color:var(--text);margin-bottom:12px}
p{font-size:14px;color:var(--text-mid);max-width:400px;line-height:1.6;margin-bottom:28px}
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:700;text-decoration:none;transition:all .15s}
.btn-blue{background:var(--blue);color:var(--white)}
.btn-blue:hover{background:var(--blue-dark)}
.btn-outline{background:transparent;color:var(--text-mid);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--text-mid)}
</style>
</head>
<body>
<a href="/" class="logo">
  <img src="https://assets.cdn.filesafe.space/7IyUgu1zpi38MDYpSDTs/media/697a3aee1fd827ffd863448d.svg" alt="Terms For Sale" style="height:48px">
</a>
<h1>404</h1>
<h2>Page Not Found</h2>
<p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
<div class="btns">
  <a href="/" class="btn btn-blue">Browse Active Deals</a>
  <a href="/blog/" class="btn btn-outline">Read the Blog</a>
</div>
</body>
</html>
