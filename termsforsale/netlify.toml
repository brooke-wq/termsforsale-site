[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/drive-photos"
  to = "/.netlify/functions/drive-photos"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
