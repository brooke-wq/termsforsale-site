# Commercial Stack Engine — local + droplet deployment
# Usage: docker-compose up -d
# All env vars sourced from .env in the same directory.

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stack_engine}
      POSTGRES_USER: ${POSTGRES_USER:-cse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - cse_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"  # bind to localhost only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cse} -d ${POSTGRES_DB:-stack_engine}"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build:
      context: ./scraper-service
      dockerfile: Dockerfile
    container_name: cse-scraper
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3100
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-stack_engine}
      POSTGRES_USER: ${POSTGRES_USER:-cse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      WEBSHARE_API_KEY: ${WEBSHARE_API_KEY}
      SCRAPER_AUTH_TOKEN: ${SCRAPER_AUTH_TOKEN}
      SCRAPE_RATE_LIMIT_MS: ${SCRAPE_RATE_LIMIT_MS:-4000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3100:3100"  # bind to localhost only; n8n reaches via host network
    # Playwright needs more shm for Chromium
    shm_size: "1gb"

volumes:
  cse_pgdata:
